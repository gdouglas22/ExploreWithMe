server.port=9090

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:6542/statdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:stat}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:stat}
